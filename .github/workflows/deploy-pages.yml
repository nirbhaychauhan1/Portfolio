# Deploy Next.js static export to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set BASE_PATH for GitHub Pages
        id: base
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "base_path=" >> $GITHUB_OUTPUT
          else
            echo "base_path=/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build for GitHub Pages
        env:
          BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: npm run build

      - name: Ensure root files at site root (verification, sitemap, robots)
        run: |
          [ -f public/googledf0c94a89cc9a93b.html ] && cp public/googledf0c94a89cc9a93b.html out/
          [ -f public/sitemap.xml ] && cp public/sitemap.xml out/
          [ -f public/robots.txt ] && cp public/robots.txt out/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
